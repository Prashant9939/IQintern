<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Certificate of Achievements</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #1a1e2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Lora', serif;
  }

  /* ── Outer wrapper: maintains 16:9 aspect ratio ── */
  .cert-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    position: relative;
  }

  /* ── The certificate itself ── */
  .certificate {
    position: absolute;
    inset: 0;
    background: #F0EDE3;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
  }

  /* ── Subtle linen texture overlay ── */
  .certificate::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.04) 2px,
        rgba(255,255,255,0.04) 4px
      );
    pointer-events: none;
    z-index: 1;
  }

  /* ── All internal layers above texture ── */
  .cert-layer { position: absolute; inset: 0; z-index: 2; }

  /* ============================================================
     SVG DECORATIVE BACKGROUND
  ============================================================ */
  .cert-bg-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  /* ============================================================
     CONTENT LAYER
  ============================================================ */
  .cert-content {
    position: absolute;
    inset: 0;
    z-index: 10;
  }

  /* All text elements use % positions so they scale perfectly */
  .cert-title {
    position: absolute;
    left: 50%;
    top: 13%;
    transform: translateX(-50%);
    text-align: center;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    color: #263238;
    white-space: nowrap;
    font-size: clamp(14px, 4vw, 52px);
    letter-spacing: 0.12em;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
  }

  .cert-subtitle {
    position: absolute;
    left: 50%;
    top: 30%;
    transform: translateX(-50%);
    text-align: center;
    font-family: 'Lora', serif;
    font-weight: 400;
    color: #3a3a3a;
    white-space: nowrap;
    font-size: clamp(8px, 1.6vw, 22px);
    letter-spacing: 0.08em;
  }

  .cert-name {
    position: absolute;
    left: 50%;
    top: 42%;
    transform: translateX(-50%);
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-style: italic;
    color: #2b3040;
    white-space: nowrap;
    font-size: clamp(18px, 4.8vw, 64px);
    letter-spacing: 0.04em;
  }

  /* Horizontal rule below name */
  .cert-divider {
    position: absolute;
    left: 50%;
    top: 57%;
    transform: translateX(-50%);
    width: 55%;
    height: 1px;
    background: linear-gradient(to right, transparent, #888, transparent);
  }

  .cert-description {
    position: absolute;
    left: 50%;
    top: 62%;
    transform: translateX(-50%);
    width: 55%;
    text-align: center;
    font-family: 'Lora', serif;
    font-weight: 400;
    color: #444;
    font-size: clamp(6px, 1.1vw, 15px);
    line-height: 1.65;
  }

  /* DATE */
  .cert-date-block {
    position: absolute;
    left: 26%;
    bottom: 9%;
    text-align: center;
    transform: translateX(-50%);
  }
  .cert-date-line {
    width: clamp(60px, 12%, 140px);
    height: 1px;
    background: #555;
    margin: 0 auto 4% auto;
  }
  .cert-date-label {
    font-family: 'Lora', serif;
    font-size: clamp(6px, 1vw, 13px);
    letter-spacing: 0.2em;
    color: #263238;
    font-weight: 600;
  }

  /* SIGNATURE */
  .cert-sig-block {
    position: absolute;
    right: 14%;
    bottom: 9%;
    text-align: center;
    transform: translateX(50%);
  }
  .cert-sig-line {
    width: clamp(60px, 12%, 140px);
    height: 1px;
    background: #555;
    margin: 0 auto 4% auto;
  }
  .cert-sig-label {
    font-family: 'Lora', serif;
    font-size: clamp(6px, 1vw, 13px);
    letter-spacing: 0.2em;
    color: #263238;
    font-weight: 600;
  }

  /* ============================================================
     TOP-RIGHT RIBBON BANNER
  ============================================================ */
  .cert-ribbon {
    position: absolute;
    top: 0;
    right: 8%;
    z-index: 12;
  }

  /* ============================================================
     AWARD BADGE (top-right, below ribbon)
  ============================================================ */
  .cert-badge {
    position: absolute;
    top: 28%;
    right: 5%;
    z-index: 12;
  }

  /* ── Print Button ── */
  .print-btn-wrap {
    display: flex;
    justify-content: center;
    margin-top: 28px;
  }

  .print-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 36px;
    background: transparent;
    border: 1.5px solid rgba(245,166,35,0.7);
    border-radius: 4px;
    color: #F5A623;
    font-family: 'Lora', serif;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.22s, color 0.22s, border-color 0.22s, box-shadow 0.22s;
  }
  .print-btn svg { flex-shrink: 0; }
  .print-btn:hover {
    background: #F5A623;
    border-color: #F5A623;
    color: #1a1e2e;
    box-shadow: 0 0 22px rgba(245,166,35,0.35);
  }
  .print-btn:hover svg path,
  .print-btn:hover svg rect { stroke: #1a1e2e; }
  .print-btn:active { transform: scale(0.97); }

  /* ── Print styles: show only the certificate, no browser headers/footers ── */
  /* ============================================================
   PERFECT PRINT MODE
============================================================ */
@media print {

  @page {
    size: A4 landscape;
    margin: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    background: #F0EDE3 !important;

    /* Removes browser color adjustment issues */
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  body * {
    visibility: hidden;
  }

  .cert-wrapper,
  .cert-wrapper * {
    visibility: visible;
  }

  .cert-wrapper {
    position: fixed !important;
    left: 0 !important;
    top: 0 !important;

    width: 100vw !important;
    height: 100vh !important;

    margin: 0 !important;
    padding: 0 !important;

    max-width: none !important;
    aspect-ratio: unset !important;
  }

  .certificate {
    width: 100% !important;
    height: 100% !important;
    box-shadow: none !important;
    overflow: hidden !important;
  }

  .print-btn-wrap {
    display: none !important;
  }
}

</style>
</head>
<body>

<div class="cert-wrapper">
  <div class="certificate">

    <!-- ── Decorative SVG background ── -->
    <svg class="cert-bg-svg" viewBox="0 0 1333 750" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Dark teal arcs on the left -->
      <path d="M-30 -20 C 80 100, 120 280, 60 420 C 10 530, -40 640, -10 760 L -50 760 L -50 -20 Z"
            fill="#37474F" opacity="0.95"/>
      <path d="M-30 -20 C 120 120, 180 320, 100 480 C 50 590, -20 680, 20 770 L -50 770 L -50 -20 Z"
            fill="#455A64" opacity="0.7"/>
      <!-- Teal arc outline / grey inner arc -->
      <path d="M 0 -30 C 280 60, 340 300, 180 550 C 80 700, -20 730, -20 760"
            fill="none" stroke="#78909C" stroke-width="1.5" opacity="0.6"/>

      <!-- Gold/orange outer sweeping arc (top-left area) -->
      <path d="M -10 -30
               C 100 80,  260 -10, 380 60
               C 550 160, 560 340, 400 480
               C 280 590, 60 640, -10 760
               L -50 760 L -50 -50 Z"
            fill="#F5A623" opacity="0.85"/>

      <!-- Lighter gold inner sweeping band -->
      <path d="M -10 -30
               C 130 60, 300 -20, 430 60
               C 600 150, 610 350, 440 490
               C 300 610, 50 655, -10 760
               L 40 760
               C 110 650, 370 580, 500 460
               C 670 320, 660 140, 490 50
               C 360 -20, 180 70, 60 -10 Z"
            fill="#FBBF24" opacity="0.6"/>

      <!-- Cream/light band between gold and main body -->
      <path d="M -10 -30
               C 160 50, 340 -30, 470 55
               C 650 150, 660 360, 480 510
               C 320 640, 60 670, -10 760
               L 60 760
               C 120 665, 390 600, 550 470
               C 730 310, 710 100, 530 10
               C 380 -60, 190 60, 60 -30 Z"
            fill="#FDE68A" opacity="0.45"/>

      <!-- Top-right ribbon shape -->
      <path d="M 1200 0 L 1333 0 L 1333 200 L 1267 160 L 1200 200 Z"
            fill="#F5A623"/>
      <path d="M 1220 0 L 1333 0 L 1333 190 L 1277 153 L 1220 190 Z"
            fill="#FBBF24" opacity="0.55"/>

      <!-- Bottom bar (very subtle dark band) -->
      <rect x="0" y="720" width="1333" height="30" fill="#263238" opacity="0.12"/>

    </svg>

    <!-- ── Award badge (SVG, top-right) ── -->
    <svg class="cert-badge" viewBox="0 0 120 120" width="10%" style="min-width:60px;max-width:120px;" xmlns="http://www.w3.org/2000/svg">
      <!-- Gear/star border -->
      <polygon points="60,4 68,20 85,14 84,32 100,38 92,54 105,65 93,76 100,92 83,93 80,110 64,104 54,118 44,104 28,110 25,93 8,92 15,76 3,65 16,54 8,38 24,32 23,14 39,20"
               fill="#F5A623"/>
      <!-- Inner dark circle -->
      <circle cx="60" cy="62" r="32" fill="#37474F"/>
      <!-- AWARD text -->
      <text x="60" y="57" text-anchor="middle" fill="#F5A623"
            font-family="Cinzel, serif" font-size="10" font-weight="700" letter-spacing="1">AWARD</text>
      <text x="60" y="70" text-anchor="middle" fill="#FBBF24"
            font-family="Lora, serif" font-size="7" letter-spacing="0.5">★ ★ ★</text>
    </svg>

    <!-- ── Content Layer ── -->
    <div class="cert-content">

      <div class="cert-title">CERTIFICATE</div>
      <div class="cert-subtitle">Of Achievements</div>
      <div class="cert-name">{{STUDENT_NAME}}</div>
      <div class="cert-divider"></div>
      <div class="cert-description">
        This is presented in recognition of outstanding achievement and exceptional dedication.
        Awarded with honour for contributions that inspire and make a lasting difference.
      </div>

      <!-- DATE block -->
      <div class="cert-date-block">
        <div class="cert-date-value" style="font-size: clamp(8px, 1.2vw, 16px); font-weight: bold; margin-bottom: 2px; color: #263238; font-family: 'Lora', serif;">{{COMPLETION_DATE}}</div>
        <div class="cert-date-line"></div>
        <div class="cert-date-label">DATE</div>
      </div>

      <!-- SIGNATURE block -->
      <div class="cert-sig-block">
        <div class="cert-sig-line"></div>
        <div class="cert-sig-label">SIGNATURE</div>
      </div>

      <div style="position: absolute; left: 50%; bottom: 4%; transform: translateX(-50%); text-align: center;">
        <span style="font-size: clamp(6px, 0.8vw, 12px); font-family: monospace; color: #78909C; letter-spacing: 0.1em;">VERIFICATION ID: {{VERIFICATION_ID}}</span>
      </div>
    </div><!-- /.cert-content -->

  </div><!-- /.certificate -->
</div><!-- /.cert-wrapper -->

<!-- Print button -->
<div class="print-btn-wrap">
  <button class="print-btn" onclick="printCertificate()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="9" width="16" height="11" rx="1" stroke="#F5A623" stroke-width="1.6"/>
      <path d="M7 9V4h10v5" stroke="#F5A623" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M7 15h10M7 18h6" stroke="#F5A623" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="17.5" cy="12.5" r="1" fill="#F5A623"/>
    </svg>
    Print Certificate
  </button>
</div>

<script>
  /* ── Fit certificate to viewport ── */
  function fitCertificate() {
    const wrapper = document.querySelector('.cert-wrapper');
    const vw = window.innerWidth  - 40;
    const vh = window.innerHeight - 40;
    const ratio = 16 / 9;

    let w, h;
    if (vw / vh > ratio) {
      h = vh;
      w = h * ratio;
    } else {
      w = vw;
      h = w / ratio;
    }

    wrapper.style.width  = w + 'px';
    wrapper.style.height = h + 'px';
  }

  fitCertificate();
  window.addEventListener('resize', fitCertificate);

  /* ── Print only the certificate ──
   *
   * Strategy: clone the .certificate div, append it as
   * a full-screen sibling (#print-clone), then call
   * window.print(). The @media print CSS hides everything
   * else and shows only #print-clone.
   * After printing we remove the clone.
   */
  function printCertificate() {
    // Remove any stale clone
    const stale = document.getElementById('print-clone');
    if (stale) stale.remove();

    // Deep-clone the certificate
    const cert = document.querySelector('.certificate');
    const clone = cert.cloneNode(true);

    // Wrap in a full-page div
    const wrap = document.createElement('div');
    wrap.id = 'print-clone';
    wrap.appendChild(clone);
    document.body.appendChild(wrap);

    // Trigger print
    window.print();

    // Clean up after the print dialog closes
    window.addEventListener('afterprint', function cleanup() {
      wrap.remove();
      window.removeEventListener('afterprint', cleanup);
    });
  }
</script>

</body>
</html>
